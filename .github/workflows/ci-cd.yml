name: CI / CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Detect whether anything outside docs/README changed. Used to gate the
  # publish + deploy jobs so a README-only push doesn't rebuild images
  # or redeploy prod.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!README.md'
              - '!docs/**'
              - '!.github/codeflow-card.svg'
              - '!.github/workflows/codeflow-card.yml'
              - '!**/*.md'
              - '!scripts/launcher/**'

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @bidwright/db db:generate

      - name: Typecheck web
        run: pnpm --filter @bidwright/web exec tsc --noEmit

      - name: Typecheck API
        run: pnpm --filter @bidwright/api exec tsc --noEmit

      - name: Typecheck worker
        run: pnpm --filter @bidwright/worker exec tsc --noEmit

      - name: Build API
        run: pnpm --filter @bidwright/api build

      - name: Build worker
        run: pnpm --filter @bidwright/worker build

      - name: Build web
        run: pnpm --filter @bidwright/web build

      - name: Run schedule unit tests
        run: pnpm exec tsx --test apps/web/lib/schedule-utils.test.ts

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config > /dev/null

      - name: Validate production registry compose
        run: docker compose -f docker-compose.prod-registry.yml config > /dev/null

      - name: Validate launcher compose
        run: docker compose -f scripts/launcher/docker-compose.yml config > /dev/null

  publish:
    needs:
      - verify
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
      && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
          - service: web
            dockerfile: Dockerfile.web
          - service: worker
            dockerfile: Dockerfile.worker
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner_lc }}/bidwright-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

  deploy:
    needs:
      - verify
      - publish
      - changes
    # Production lives on the on-prem Dokploy/Swarm cluster (project
    # "bidwright" at https://cloud.rassaun.com). The deploy step just
    # POSTs to a Dokploy webhook URL — Dokploy then runs `docker stack
    # deploy` on dokploy-mgr, which resolves `:latest` from GHCR and
    # rolls each service to the new digest. No SSH, no self-hosted
    # runners, no LAN dependency.
    #
    # For a sha-pinned rollback, set BIDWRIGHT_TAG=sha-<old-short> in the
    # Dokploy UI (Environment tab on the bidwright compose) and click
    # Deploy — every commit's sha-tagged image is preserved in GHCR by
    # the publish job above.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    if: >
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        vars.ENABLE_SERVER_DEPLOY == 'true'))
      && needs.changes.outputs.code == 'true'
    concurrency:
      group: bidwright-production-deploy
      cancel-in-progress: false

    steps:
      - name: Assert deploy configuration
        env:
          DOKPLOY_WEBHOOK: ${{ secrets.DOKPLOY_BIDWRIGHT_WEBHOOK }}
        run: test -n "$DOKPLOY_WEBHOOK"

      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_WEBHOOK: ${{ secrets.DOKPLOY_BIDWRIGHT_WEBHOOK }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "Triggering Dokploy redeploy for bidwright (commit ${SHORT_SHA})…"
          # Dokploy responds with {"message":"Compose deployed successfully"}
          # synchronously after kicking off the background `docker stack deploy`.
          # The actual rollout completes in ~30–90s on dokploy-mgr.
          response=$(curl -sf -X GET --max-time 30 "$DOKPLOY_WEBHOOK")
          echo "Dokploy response: $response"
          echo "::notice title=Deploy triggered::Bidwright commit ${SHORT_SHA} redeploy kicked off. Watch progress at https://cloud.rassaun.com → bidwright → Logs."
