name: Demo Web Deploy

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/domain/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - vercel.json
      - .github/workflows/demo-web-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bidwright-demo-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Assert Vercel deploy hook
        run: |
          test -n "$VERCEL_DEPLOY_HOOK_URL"

      - name: Trigger Vercel production deploy
        run: |
          curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
