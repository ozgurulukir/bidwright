name: Demo API Container Deploy

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.demo-api
      - Dockerfile.api
      - apps/api/**
      - apps/demo-api/**
      - packages/agent/**
      - packages/ai/**
      - packages/db/**
      - packages/domain/**
      - packages/ingestion/**
      - packages/integrations/**
      - packages/mcp-server/**
      - packages/vector/**
      - packages/vision/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - .github/workflows/demo-api-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bidwright-demo-api-container
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Assert Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck demo container Worker
        run: pnpm --filter @bidwright/demo-api typecheck

      - name: Deploy demo API Container Worker
        run: pnpm --filter @bidwright/demo-api run deploy
