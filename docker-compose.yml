services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bidwright
      POSTGRES_PASSWORD: bidwright
      POSTGRES_DB: bidwright
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidwright -d bidwright"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bidwright:bidwright@postgres:5432/bidwright
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      API_PORT: "3001"
      # Multi-tenant server mode: each authenticated user gets their own CLI
      # auth namespace under AGENT_HOME_ROOT/users/<userId>. The runtime sets
      # CLAUDE_CONFIG_DIR / CODEX_HOME / XDG_DATA_HOME / HOME at spawn time
      # so user A's Claude OAuth never leaks into user B's CLI session.
      BIDWRIGHT_MODE: server
      AGENT_HOME_ROOT: /data/agent-home
    volumes:
      - ./data/bidwright-api:/data
      - ./data/agent-home:/data/agent-home
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}"
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bidwright:bidwright@postgres:5432/bidwright
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      API_PORT: "3001"
    volumes:
      - ./data/bidwright-api:/data

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "11434:11434"

volumes:
  pgdata:
  redisdata:
  ollama_data:
