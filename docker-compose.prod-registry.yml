# Production compose — Dokploy compose mode (NOT swarm/stack mode).
#
# This file is the source of truth for what runs in production on the
# Dokploy/Docker cluster (project "bidwright" in the Dokploy UI at
# https://cloud.rassaun.com). It is mirrored into Dokploy's compose
# storage at /etc/dokploy/compose/bidwright/code/docker-compose.yml.
#
# IMPORTANT: this stack runs in Dokploy's `docker-compose` mode, NOT
# `stack` mode. Reason: the api service needs `security_opt:
# [seccomp:unconfined, apparmor:unconfined]` for bubblewrap (bwrap) to
# work — bwrap sandboxes per-tenant CLI sessions (claude, codex, etc.)
# via mount + pid + ipc + uts namespacing, and the docker-default
# apparmor profile blocks bwrap's `mount --make-slave /` call even with
# CAP_SYS_ADMIN. Docker Swarm (`docker stack deploy`) silently DROPS
# `security_opt`; only standalone compose honors it. The composeType is
# stored in Dokploy's postgres compose row — if you re-create this stack
# from scratch, make sure to set composeType='docker-compose' (not 'stack').
#
# Image strategy:
#   - CI pushes both `:latest` and `:sha-<short>` tags to GHCR on every
#     successful build of the default branch (see .github/workflows/ci-cd.yml).
#   - This compose references `:${BIDWRIGHT_TAG:-latest}`; the live Dokploy
#     env keeps BIDWRIGHT_TAG=latest so each webhook redeploy pulls the
#     fresh digest.
#   - For an immutable rollback, set BIDWRIGHT_TAG=sha-<old> in the
#     Dokploy env tab and click Deploy.
#
# Persistent state is in four named volumes managed by Dokploy (data
# lives under /var/lib/docker/volumes/bidwright_bidwright-{pgdata,
# redisdata,data,agent-home}/_data). Volumes are declared `external`
# so a future re-create of the compose project doesn't wipe data.
#
# Routing: external Traefik on .96 forwards bidwright.rassaun.com →
# https://10.0.0.101:443 with insecureSkipVerify (single backend). The
# path-priority routing (api at /api, web at /api/proxy + catch-all) is
# expressed via service-level `labels:` here so Dokploy's internal
# Traefik (docker provider, watch network: dokploy-network) picks them up.

networks:
  default:
  dokploy-network:
    external: true

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-bidwright}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bidwright}"
      POSTGRES_DB: "${POSTGRES_DB:-bidwright}"
    volumes:
      - bidwright-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bidwright} -d ${POSTGRES_DB:-bidwright}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - bidwright-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Runs `prisma migrate deploy` using the runtime API image (which carries
  # the schema, migrations, and pnpm tooling because it COPYs the full /app
  # from the builder stage). No build target needed — we run the same image
  # that powers the API service.
  #
  # Migration files in packages/db/prisma/migrations are the canonical source
  # of truth for production schema changes. Destructive migrations (column
  # drops, table drops) should be authored as explicit SQL with backfill
  # blocks where data preservation matters; `migrate deploy` will apply them
  # exactly as written.
  db-migrate:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-api:${BIDWRIGHT_TAG:-latest}"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://bidwright:bidwright@postgres:5432/bidwright}"
    command: ["pnpm", "--filter", "@bidwright/db", "db:migrate"]
    networks:
      - default

  api:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-api:${BIDWRIGHT_TAG:-latest}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    # CAP_SYS_ADMIN + relaxed seccomp/apparmor are required by bubblewrap
    # (BubblewrappedHost) for per-tenant pivot_root + mount inside CLI
    # session namespaces. Scope is the api container only; bwrap drops
    # all caps before exec'ing the actual CLI child.
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    # Service-level labels — Dokploy's Traefik docker provider reads
    # these from the container labels (it does NOT read deploy.labels;
    # that's swarm-only).
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Priority 20: /api/* -> API (overridden by web-proxy at /api/proxy below)
      - traefik.http.routers.bidwright-api.rule=Host(`bidwright.rassaun.com`) && PathPrefix(`/api`)
      - traefik.http.routers.bidwright-api.priority=20
      - traefik.http.routers.bidwright-api.entrypoints=websecure
      - traefik.http.routers.bidwright-api.tls=true
      - traefik.http.routers.bidwright-api.service=bidwright-api
      - traefik.http.services.bidwright-api.loadbalancer.server.port=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://bidwright:bidwright@postgres:5432/bidwright}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      DATA_DIR: "${DATA_DIR:-/data}"
      API_PORT: "${API_PORT:-3001}"
      # Multi-tenant server mode: per-user CLI auth namespaces under
      # AGENT_HOME_ROOT/users/<userId>; spawn-time env wiring isolates each
      # user's Claude / Codex / OpenCode / Gemini auth from every other user.
      BIDWRIGHT_MODE: "${BIDWRIGHT_MODE:-server}"
      AGENT_HOME_ROOT: "${AGENT_HOME_ROOT:-/data/agent-home}"
      # When true, every CLI spawn runs inside a per-user bwrap sandbox.
      # Required for any multi-user deployment. bwrap ships setuid root in
      # the api image so no --privileged flag is needed.
      BIDWRIGHT_MULTITENANT: "${BIDWRIGHT_MULTITENANT:-true}"
      # The db-migrate container applies pending migrations (`prisma migrate deploy`)
      # before api starts, so the API's bootstrap shouldn't also try `migrate deploy`.
      BIDWRIGHT_SKIP_BOOTSTRAP_MIGRATIONS: "1"
      # Workspace snapshot/restore — see docker-compose.prod.yml for env shape.
      WORKSPACE_STORAGE_PROVIDER: "${WORKSPACE_STORAGE_PROVIDER:-}"
      WORKSPACE_S3_BUCKET: "${WORKSPACE_S3_BUCKET:-}"
      WORKSPACE_S3_REGION: "${WORKSPACE_S3_REGION:-auto}"
      WORKSPACE_S3_ENDPOINT: "${WORKSPACE_S3_ENDPOINT:-}"
      WORKSPACE_S3_ACCESS_KEY_ID: "${WORKSPACE_S3_ACCESS_KEY_ID:-}"
      WORKSPACE_S3_SECRET_ACCESS_KEY: "${WORKSPACE_S3_SECRET_ACCESS_KEY:-}"
      WORKSPACE_S3_PREFIX: "${WORKSPACE_S3_PREFIX:-bidwright/workspaces}"
      WORKSPACE_S3_FORCE_PATH_STYLE: "${WORKSPACE_S3_FORCE_PATH_STYLE:-false}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-disabled}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://ollama:11434/v1}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-snowflake-arctic-embed}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1024}"
      # LLM provider credentials are read from this env at boot; per-tenant
      # provider keys live in the database (BYOK) and override these.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5}"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-20250514}"
    volumes:
      - bidwright-data:/data
      - bidwright-agent-home:/data/agent-home
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - default
      - dokploy-network

  web:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-web:${BIDWRIGHT_TAG:-latest}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Priority 30: /api/proxy/* -> WEB (Next.js owns the proxy route;
      # this MUST outrank the api router or the api would steal everything
      # under /api).
      - traefik.http.routers.bidwright-web-proxy.rule=Host(`bidwright.rassaun.com`) && PathPrefix(`/api/proxy`)
      - traefik.http.routers.bidwright-web-proxy.priority=30
      - traefik.http.routers.bidwright-web-proxy.entrypoints=websecure
      - traefik.http.routers.bidwright-web-proxy.tls=true
      - traefik.http.routers.bidwright-web-proxy.service=bidwright-web
      # Priority 10: catch-all -> WEB (everything not /api/*)
      - traefik.http.routers.bidwright-web.rule=Host(`bidwright.rassaun.com`)
      - traefik.http.routers.bidwright-web.priority=10
      - traefik.http.routers.bidwright-web.entrypoints=websecure
      - traefik.http.routers.bidwright-web.tls=true
      - traefik.http.routers.bidwright-web.service=bidwright-web
      - traefik.http.services.bidwright-web.loadbalancer.server.port=3000
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-https://bidwright.rassaun.com}"
      INTERNAL_API_BASE_URL: "http://api:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - default
      - dokploy-network

  worker:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-worker:${BIDWRIGHT_TAG:-latest}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://bidwright:bidwright@postgres:5432/bidwright}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      DATA_DIR: "${DATA_DIR:-/data}"
      API_PORT: "${API_PORT:-3001}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-disabled}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://ollama:11434/v1}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-snowflake-arctic-embed}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1024}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - bidwright-data:/data
    networks:
      - default

volumes:
  bidwright-pgdata:
    external: true
    name: bidwright_bidwright-pgdata
  bidwright-redisdata:
    external: true
    name: bidwright_bidwright-redisdata
  bidwright-data:
    external: true
    name: bidwright_bidwright-data
  bidwright-agent-home:
    external: true
    name: bidwright_bidwright-agent-home
